name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - run: brew install pkg-config libmtp

      - name: Build
        run: swift build

      - name: Test
        run: swift test --filter MTPCoreTests
